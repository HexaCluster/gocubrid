  #     - uses: actions/setup-go@v6
  #       with:
  #         go-version: stable
  #     - name: integration matrix (all five CUBRID versions)
  #       run: |
  #         # export CUBRID_TEST_DSN_<ver>=cubrid://dba@<host>:33000/testdb
  #         # for each broker, e.g. from runner-scoped secrets.
  #         go test -tags integration -count=1 -timeout 40m -p 1 ./...
  #     - name: soak ring (11.4)
  #       run: |
  #         go test -tags soak -count=1 -race -timeout 40m ./...
